<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80">
  <!-- Vi Logo Container -->
  <rect x="10" y="10" width="60" height="60" rx="10" fill="#ED1C24"/>
  <!-- Vi Text (White on Red) -->
  <text x="40" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="40" fill="white">Vi</text>
  <!-- Movies & TV text (Black on White, Larger) -->
  <text x="80" y="36" font-family="Arial, sans-serif" font-weight="bold" font-size="30" fill="black">movies</text>
  <text x="80" y="66" font-family="Arial, sans-serif" font-weight="bold" font-size="30" fill="black">&amp; tv</text>
</svg>
